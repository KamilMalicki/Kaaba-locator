<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tytul-strony">Kaaba Finder | Kompas Kierunkowy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="pojemnik">
        <div class="wybor-jezyka-kontener">
            <select id="wybor-jezyka" class="wybor-jezyka">
                <option value="pl">Polski</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="tr">Türkçe</option>
                <option value="ar">العربية</option>
            </select>
        </div>

        <h1 id="tytul">Kompas do Kaaby</h1>

        <div id="status" class="wiadomosc status-oczekujaca">
            Oczekuję na udostępnienie lokalizacji...
        </div>
        
        <div class="kompas-kontener">
            <div id="kompas" class="kompas">
                <div class="igla igla-kaaba" id="igla-kaaba"></div>
            </div>
        </div>
        
        <div class="informacje">
            <p><span id="akt-lokalizacja">Aktualna Lokalizacja:</span> <span id="dane-lokalizacji">Szukanie...</span></p>
            
            <p><span id="etykieta-dystans">Dystans:</span> <span id="dane-dystansu">---</span></p>
            
            <p><span id="kierunek-kaaby">Kierunek do Kaaby:</span> <span id="kat-kaaby">---</span></p>
            
            <p id="info-orientacja" class="wskazowka">Ładowanie kompasu...</p>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
